# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect this repo

databases:
  - name: etl-analytics-db
    plan: free
    databaseName: etl_analytics
    user: etl_user

services:
  - type: web
    name: etl-analytics-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: etl-analytics-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
        # Set after Vercel deploy, e.g. https://your-app.vercel.app
